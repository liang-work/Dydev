name: Build dydev

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms (comma-separated): windows, linux, macos, android, ios'
        required: true
        default: 'windows,linux,macos,android,ios'

jobs:
  windows:
    if: contains(inputs.platforms, 'windows')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Build
        run: flutter build windows --release
      - name: Create zip archive
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dydev-windows.zip
      - name: Build installer (Inno Setup)
        continue-on-error: true
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $exe = "build\windows\x64\runner\Release\dydev.exe"
          $ver = (Get-Item $exe).VersionInfo.FileVersion
          $iss = @"
          [Setup]
          AppName=dydev
          AppVersion=$ver
          DefaultDirName={autopf}\dydev
          DefaultGroupName=dydev
          OutputDir=installer_output
          OutputBaseFilename=dydev-setup-$ver
          [Files]
          Source: "$exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          "@
          $iss | Out-File setup.iss -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: dydev-Windows
          path: |
            dydev-windows.zip
            installer_output/*.exe
          if-no-files-found: warn

  linux:
    if: contains(inputs.platforms, 'linux')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev
      - name: Get dependencies
        run: flutter pub get
      - name: Build
        run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: dydev-Linux
          path: build/linux/x64/release/bundle/
          if-no-files-found: error

  macos:
    if: contains(inputs.platforms, 'macos')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Build
        run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: dydev-macOS
          path: build/macos/Build/Products/Release/
          if-no-files-found: error

  android:
    if: contains(inputs.platforms, 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE }}
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/key.jks
          echo "storeFile=key.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
      - name: Build APK
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: dydev-Android
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  ios:
    if: contains(inputs.platforms, 'ios')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Get dependencies
        run: flutter pub get
      - name: Decode certificate
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        if: env.IOS_CERTIFICATE_P12 != ''
        run: |
          echo "$IOS_CERTIFICATE_P12" | base64 -d > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import certificate.p12 -P "$IOS_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
      - name: Decode provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        if: env.IOS_PROVISIONING_PROFILE != ''
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision | \
            xmllint --xpath "string(//key[.='UUID']/following-sibling::string[1])" -)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "IOS_PROVISIONING_PROFILE_NAME=$UUID" >> $GITHUB_ENV
      - name: Set signing flag
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          if [ -n "$IOS_TEAM_ID" ]; then
            echo "HAS_SIGNING=1" >> $GITHUB_ENV
          else
            echo "HAS_SIGNING=0" >> $GITHUB_ENV
          fi
      - name: Build IPA (unsigned)
        if: env.HAS_SIGNING == '0'
        run: flutter build ipa --release --no-codesign
      - name: Build IPA (signed)
        if: env.HAS_SIGNING == '1'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE: "Apple Distribution"
        run: flutter build ipa --release
      - uses: actions/upload-artifact@v4
        with:
          name: dydev-iOS
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
